<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Companies - PlacePro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/web.css">
</head>

<body>
    <div class="loader-overlay" id="loader">
        <div class="loader">
            <div class="cube">
                <div class="face"></div>
                <div class="face"></div>
                <div class="face"></div>
                <div class="face"></div>
                <div class="face"></div>
                <div class="face"></div>
            </div>
            <div class="loader-text">Loading</div>
        </div>
    </div>
    <div class="particles"></div>

    <div class="sidebar-3d-indicator">
        <div class="indicator-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </div>
    </div>


    <!-- CIRCULAR LOGO -->
    <a href="web.html" class="circular-logo" title="Back to Home">
        <img src="../logo.jpeg" alt="PlacePro Logo">
    </a>

    <!-- NEON AUTH BUTTONS -->
    <div class="hamburger-container">
        <label class="hamburger">
            <input type="checkbox" id="hamburgerToggle">
            <svg viewBox="0 0 32 32">
                <path class="line line-top-bottom" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L7 26"></path>
                <path class="line" d="M7 16 27 16"></path>
                <path class="line line-top-bottom" d="M27 22 13 22C10.8 22 9 23.8 9 26 9 28.5 10.8 30 13 30 15.2 30 17 28.2 17 26L7 6"></path>
            </svg>
        </label>
        <div class="dropdown-menu">
            <button class="neon-btn">About</button>
            <button id="loginBtn" class="neon-btn neon-btn--login">Login</button>
            <button id="signupBtn" class="neon-btn neon-btn--signup">Sign Up</button>
            <div class="theme-switch-container">
                <label class="theme-switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider-switch"></span>
                </label>
            </div>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div id="authModal" class="auth-modal">
        <div class="wrapper">
            <div class="card-switch">
                <label class="switch">
                    <input type="checkbox" class="toggle" id="authToggle">
                    <span class="slider"></span>
                    <span class="card-side"></span>
                    <div class="flip-card__inner">
                        <div class="flip-card__front">
                            <div class="title">Log in</div>
                            <form class="flip-card__form" action="">
                                <input class="flip-card__input" name="email" placeholder="Email" type="email">
                                <input class="flip-card__input" name="password" placeholder="Password" type="password">
                                <button class="flip-card__btn">Let's go!</button>
                            </form>
                        </div>
                        <div class="flip-card__back">
                            <div class="title">Sign up</div>
                            <form class="flip-card__form" action="">
                                <input class="flip-card__input" placeholder="Name" type="name">
                                <input class="flip-card__input" name="email" placeholder="Email" type="email">
                                <input class="flip-card__input" name="password" placeholder="Password" type="password">
                                <button class="flip-card__btn">Confirm!</button>
                            </form>
                        </div>
                    </div>
                </label>
            </div>
            <button class="modal-close" id="closeAuthModal">&times;</button>
        </div>
    </div>

    <div class="container">

        <!-- SEMICIRCLE SIDEBAR -->
        <aside class="semi-sidebar">
            <div class="semi-base"></div>
            <ul class="semi-icons">
                <li class="semi-item" data-section="dashboard" data-label="Dashboard" data-nav="web.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                </li>
                <li class="semi-item active" data-section="companies" data-label="Companies">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z">
                        </path>
                    </svg>
                </li>
                <li class="semi-item" data-section="students" data-label="Students" data-nav="students.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </li>
                <li class="semi-item" data-section="analytics" data-label="Analytics">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="2" x2="12" y2="22"></line>
                        <path d="M17 5c0 2.21-1.79 4-4 4s-4-1.79-4-4"></path>
                        <path d="M17 19c0-2.21-1.79-4-4-4s-4 1.79-4 4"></path>
                    </svg>
                </li>
            </ul>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <h1>Companies Visited - 2026 Batch</h1>

            <!-- TOP CONTROLS (Action Bar) -->
            <div class="top-controls">
                <button class="primary-btn" id="addCompanyBtn">+ Add Company</button>
                <div class="control-group">
                    <input type="text" id="searchInput" placeholder="Search company...">
                    <select id="ctcFilter">
                        <option value="all">All Packages</option>
                        <option value="high">Above 15 LPA</option>
                        <option value="mid">5 - 15 LPA</option>
                        <option value="low">Below 5 LPA</option>
                    </select>
                </div>
            </div>

            <!-- TABLE -->
            <div class="table-container">
                <table id="companyTable">
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Role</th>
                            <th>CTC (LPA)</th>
                            <th>Visit Date</th>
                            <th>Location</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>ABC Corp</td>
                            <td>Software Engineer</td>
                            <td>12</td>
                            <td>12 Jan 2026</td>
                            <td>Bangalore</td>
                        </tr>
                        <tr>
                            <td>XYZ Tech</td>
                            <td>Data Analyst</td>
                            <td>18</td>
                            <td>25 Jan 2026</td>
                            <td>Hyderabad</td>
                        </tr>
                        <tr>
                            <td>Innovate Ltd</td>
                            <td>Graduate Trainee</td>
                            <td>4</td>
                            <td>10 Feb 2026</td>
                            <td>Pune</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="../js/web.js"></script>
</body>

</html>
